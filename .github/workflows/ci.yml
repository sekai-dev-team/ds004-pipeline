name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: python -m compileall pipeline/ collect.py
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: kona01z
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            kona01z/ds004-pipeline:latest
            kona01z/ds004-pipeline:sha-${{ github.sha }}
